name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Remove server-only routes
        run: |
          rm -rf src/app/api
          rm -rf src/app/gruempi/admin
          rm -rf src/app/gruempi/feld
          rm -rf src/app/gruempi/login
          rm -f middleware.ts
          # Root page uses server-side redirect; replace with no-op for static export
          echo 'export default function RootPage() { return null; }' > src/app/page.tsx

      - name: Build static export
        run: npm run build
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: "/gruempi"

      - name: Prepare Pages artifact
        run: |
          # Copy _next assets and public files into the gruempi subdir,
          # which is uploaded as the artifact root (served at /gruempi/ on Pages)
          cp -r out/_next out/gruempi/_next
          find out -maxdepth 1 -type f -exec cp {} out/gruempi/ \;

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/gruempi/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
